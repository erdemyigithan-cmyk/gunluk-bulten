# Günlük Bülten Sentezi — yapılandırma

bultenler:
  # Bültenleri gönderen adresler (küçük harf).
  senderlar:
    - "hello@e.fintables.com"
    - "ft@newsletters.ft.com"
  # İsteğe bağlı: adrese sabit/temiz kaynak adı ata (sentezde "kaynaklar" bunu kullanır).
  # Boşsa mailin "Kimden" görünen adı kullanılır.
  adlar:
    "hello@e.fintables.com": "Fintables"
    "ft@newsletters.ft.com": "FT"
  gmail_label: ""               # ör. "Bültenler" (doluysa senderlar yerine bu kullanılır)

hedeffiyat:
  # Hedeffiyat'ta izlenecek aracı kurumların adları (sayfadaki yazımıyla).
  # Faz 2 fetcher her kurumun GÜNLÜK bültenini seçer (haftalık/teknik raporları değil).
  kurumlar:
    - "Halk Yatırım"
    - "Yapı Kredi Yatırım"
    - "Deniz Yatırım"
    - "A1 Capital"

sentez:
  # backend: "cli"  -> Claude Code aboneliği (claude -p), EK ÜCRET YOK (varsayılan)
  #          "api"  -> ANTHROPIC_API_KEY ile faturalı API
  backend: "cli"
  cli_model: "sonnet"          # cli backend için alias: sonnet | opus
  model: "claude-sonnet-4-6"   # sadece api backend kullanılırsa geçerli

calisma_saati: "08:00"          # launchd bu saatte çalıştırır
arsiv_dizini: "./archive"
pano_dizini: "./site"
